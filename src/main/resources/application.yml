spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dineos}
    username: ${SPRING_DATASOURCE_USERNAME:dineos}
    password: ${SPRING_DATASOURCE_PASSWORD:dineos}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dineos-jwt-secret-key-change-this-to-a-long-secret-123456}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    issuer: ${JWT_ISSUER:DineOS}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:5174
      - http://127.0.0.1:3000
      - http://127.0.0.1:5173
      - http://127.0.0.1:5174
      - "*"
  menu:
    base-url: ${MENU_BASE_URL:http://localhost:3000}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
    currency: ${RAZORPAY_CURRENCY:INR}
